services:
  - type: web
    name: emomo-api
    env: go
    rootDir: backend
    buildCommand: go build -o api ./cmd/api
    startCommand: ./api
    envVars:
      - key: CONFIG_PATH
        value: ./configs/config.yaml
      - key: STORAGE_TYPE
        value: r2
      - key: STORAGE_ENDPOINT
        sync: false
      - key: STORAGE_ACCESS_KEY
        sync: false
      - key: STORAGE_SECRET_KEY
        sync: false
      - key: STORAGE_USE_SSL
        value: "true"
      - key: STORAGE_BUCKET
        sync: false
      - key: STORAGE_REGION
        value: auto
      - key: STORAGE_PUBLIC_URL
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: VLM_MODEL
        sync: false
      - key: JINA_API_KEY
        sync: false
      - key: QDRANT_HOST
        sync: false
      - key: QDRANT_PORT
        value: "6334"
      - key: QDRANT_API_KEY
        sync: false
      - key: QDRANT_USE_TLS
        value: "true"
